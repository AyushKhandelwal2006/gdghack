<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Choices — The Bias Engine</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Dynamic Background Layers -->
<div id="bg"></div>
<canvas id="particles"></canvas>
<div class="orb orb1" id="orb1"></div>
<div class="orb orb2" id="orb2"></div>
<div class="orb orb3" id="orb3"></div>
<div id="grain"></div>

<!-- Floating Stickers -->
<div class="sticker sticker-1">🎮</div>
<div class="sticker sticker-2">⚡</div>
<div class="sticker sticker-3">🕹️</div>
<div class="sticker sticker-4">🏆</div>
<div class="sticker sticker-5">🎯</div>
<div class="sticker sticker-6">💎</div>
<div class="sticker sticker-7">🔥</div>
<div class="sticker sticker-8">🌟</div>

<div id="app">

  <header class="site-header">
    <h1>Life <span>Choices</span></h1>
    <p>Same actions · Different outcomes · The bias engine</p>
    <div class="header-rank">
      <div class="rank-dot"></div>
      PLAYER SELECT — NEW GAME
    </div>
  </header>

  <!-- Mode Toggle -->
  <div id="mode-wrap">
    <button class="mode-btn active" id="btn-single" onclick="setMode('single')">⚡ Solo Journey</button>
    <button class="mode-btn" id="btn-dual" onclick="setMode('dual')">⚔️ Compare Two Lives</button>
  </div>

  <!-- Dual Mode: Character Tabs -->
  <div id="char-tabs" style="display:none; flex-direction:row;">
    <div class="char-tab active-tab" id="tab-a">
      <div class="ct-dot" style="background:#bf00ff; box-shadow:0 0 8px #bf00ff;"></div>
      <div>
        <div class="ct-name">PLAYER_A</div>
        <div class="ct-steps" id="tab-a-steps">0 choices</div>
      </div>
    </div>
    <div class="char-tab" id="tab-b">
      <div class="ct-dot" style="background:#ff6b00; box-shadow:0 0 8px #ff6b00;"></div>
      <div>
        <div class="ct-name">PLAYER_B</div>
        <div class="ct-steps" id="tab-b-steps">0 choices</div>
      </div>
    </div>
  </div>

  <!-- Theme Badge -->
  <div id="theme-badge">
    <div class="tbdot" id="tbdot"></div>
    <span id="tbtext">Choose Your Story</span>
  </div>

  <!-- Progress Bar -->
  <div id="progress-wrap">
    <div class="pseg" id="p0"></div>
    <div class="pseg" id="p1"></div>
    <div class="pseg" id="p2"></div>
    <div class="pseg" id="p3"></div>
    <div class="pseg" id="p4"></div>
    <div class="pseg" id="p5"></div>
    <div class="pseg" id="p6"></div>
  </div>

  <!-- Choice Trail -->
  <div id="trail-wrap"></div>

  <!-- Undo Button -->
  <button id="back-btn" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    UNDO LAST CHOICE
  </button>

  <!-- Question Card -->
  <div class="card" id="qcard">
    <div class="phase-label" id="qlabel">Begin</div>
    <span class="phase-icon" id="qicon">🌱</span>
    <div class="q-title" id="qtitle">Who are you?</div>
    <div class="q-sub" id="qsub">Your starting point shapes the entire journey ahead.</div>
  </div>

  <div class="connector" id="connector"></div>

  <!-- Choice Cards -->
  <div id="choices-wrap"></div>

  <div class="scroll-hint" id="scroll-hint">[ scroll down to see choices ↓ ]</div>

  <!-- Single Player Final Screen -->
  <div id="final-wrap"></div>

  <!-- Dual Player Comparison Screen -->
  <div id="compare-wrap"></div>

</div>

<script src="script.js"></script>
</body>
</html>
